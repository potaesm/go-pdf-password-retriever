name: Release binaries

on:
  release:
    types: [published]

jobs:
  build:
    name: Build and upload binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24

      - name: Build and package
        id: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          bin="pdfpw-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            bin="${bin}.exe"
          fi
          mkdir -p artifacts
          go build -ldflags="-s -w" -o artifacts/$bin ./cmd/pdfpw
          if [ "$GOOS" = "windows" ]; then
            archive="pdfpw-${GOOS}-${GOARCH}.zip"
            zip -j artifacts/$archive artifacts/$bin
            content_type="application/zip"
          else
            archive="pdfpw-${GOOS}-${GOARCH}.tar.gz"
            tar -czf artifacts/$archive -C artifacts "${bin}"
            content_type="application/gzip"
          fi
          echo "archive=$archive" >> $GITHUB_OUTPUT
          echo "content_type=$content_type" >> $GITHUB_OUTPUT

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: artifacts/${{ steps.build.outputs.archive }}
          asset_name: ${{ steps.build.outputs.archive }}
          asset_content_type: ${{ steps.build.outputs.content_type }}
